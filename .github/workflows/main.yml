name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip build-essential python3-pip python3-dev autoconf libtool pkg-config zlib1g-dev libncursesw5-dev libssl-dev libffi-dev libsqlite3-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade buildozer cython

      - name: Create Fresh Buildozer Spec
        run: |
          export PATH=$PATH:~/.local/bin/
          # Xóa file cũ nếu có để tránh lỗi cấu hình
          rm -f buildozer.spec
          # Tạo file mới
          buildozer init
          # Ép cấu hình chuẩn vào file mới tạo
          sed -i 's|source.dir = .|source.dir = .|g' buildozer.spec
          sed -i 's|# source.dir = .|source.dir = .|g' buildozer.spec

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin/
          buildozer android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
