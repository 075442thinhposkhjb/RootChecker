name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip build-essential python3-pip python3-dev autoconf libtool pkg-config zlib1g-dev libncursesw5-dev libssl-dev libffi-dev libsqlite3-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade buildozer cython

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin/
          # Dùng debug mode (log_level 2) để bắt lỗi chính xác
          # Bỏ qua bước tạo file spec rườm rà, để buildozer tự lo
          buildozer -v android debug log_level=2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
