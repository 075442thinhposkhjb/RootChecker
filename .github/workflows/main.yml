name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip build-essential autoconf libtool pkg-config zlib1g-dev libncursesw5-dev libssl-dev libffi-dev libsqlite3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libfreetype6-dev libgl1-mesa-dev libgles2-mesa-dev libpng-dev libjpeg-dev libx11-dev libxext-dev

      - name: Install Buildozer and Dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install buildozer cython

      - name: Build with Buildozer
        run: |
          # Cấu hình để tự động hóa mọi xác nhận (License)
          export PATH=$PATH:~/.local/bin/
          # Lệnh yes | buildozer android debug: Tự nhấn 'y' cho mọi câu hỏi
          # Thêm biến môi trường để ép Buildozer nhận đúng đường dẫn
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RootChecker_APK
          path: bin/*.apk
