name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip build-essential autoconf libtool pkg-config zlib1g-dev libncursesw5-dev libssl-dev libffi-dev libsqlite3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libfreetype6-dev libgl1-mesa-dev libgles2-mesa-dev libpng-dev libjpeg-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade buildozer cython

      - name: Pre-configure Buildozer
        run: |
          export PATH=$PATH:~/.local/bin/
          # Chạy lệnh này để nó tải SDK trước một cách lặng lẽ
          buildozer android update || true

      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin/
          # Chạy build với tham số --no-optimize để giảm tải cho CPU/RAM
          yes | buildozer -v android debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: RootChecker_APK
          path: bin/*.apk
